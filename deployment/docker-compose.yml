version: "3.8"

services:
  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: churn-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml
    working_dir: /app
    command: >
      bash -c "pip install mlflow==2.10.0 && 
               mlflow server 
               --backend-store-uri sqlite:///mlflow/mlflow.db 
               --default-artifact-root /mlflow/artifacts 
               --host 0.0.0.0 
               --port 5000"
    networks:
      - churn-network

  # Churn Prediction API
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: churn-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/churn_model.pkl
      - PREPROCESSOR_PATH=models/preprocessor.pkl
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    depends_on:
      - mlflow
    networks:
      - churn-network
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: churn-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring-config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - churn-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: churn-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring-config/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - churn-network

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:

networks:
  churn-network:
    driver: bridge